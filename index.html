<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="card">
    <header>
      <div class="header-top">
        <span class="basket-icon">&#x1F6D2;</span>
        <h1>Lista de Compras</h1>
        <span class="badge" id="total-pendentes">0</span>
      </div>
      <div class="acoes-globais">
        <button class="btn btn-secundario" id="btn-sugerir">Sugerir itens</button>
        <button class="btn btn-outline" id="btn-limpar-comprados">Limpar comprados</button>
        <button class="btn btn-danger" id="btn-limpar-tudo">Limpar tudo</button>
      </div>
    </header>

    <form class="form-adicionar" id="form-adicionar">
      <input type="text" id="input-nome" placeholder="O que você precisa comprar" required>
      <input type="number" id="input-qtd" value="0" min="0">
      <select id="select-unidade">
        <option value="un">un</option>
        <option value="kg">kg</option>
        <option value="gr">gr</option>
        <option value="L">L</option>
      </select>
      <button class="btn btn-add" id="btn-adicionar">Adicionar</button>
    </form>

    <ul id="lista-compras"></ul>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
