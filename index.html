<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lista de compras simples que funciona offline." />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Compras" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Lista de Compras</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Lista de Compras</h1>
        <p class="subtitle" id="counter">0 itens pendentes</p>
      </header>

      <footer class="actions">
        <button type="button" class="btn-secondary" id="suggest-items">
          Sugerir itens
        </button>
        <button type="button" class="btn-secondary" id="clear-completed" disabled>
          Limpar comprados
        </button>
        <button type="button" class="btn-danger" id="clear-all" disabled>
          Limpar tudo
        </button>
      </footer>

      <form class="add-form" id="add-form" autocomplete="off">
        <input
          type="text"
          id="item-input"
          placeholder="O que você precisa comprar?"
          maxlength="120"
          required
        />
        <input
          type="number"
          id="item-qty"
          value="0"
          min="0"
          step="any"
          class="qty-input"
        />
        <select id="item-unit" class="unit-select">
          <option value="un">un</option>
          <option value="gr">gr</option>
          <option value="kg">kg</option>
          <option value="ml">ml</option>
          <option value="L">L</option>
        </select>
        <button type="submit">Adicionar</button>
      </form>

      <ul class="list" id="list" aria-live="polite"></ul>

      <p class="empty-state" id="empty-state">Sua lista está vazia. Adicione o primeiro item acima.</p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
